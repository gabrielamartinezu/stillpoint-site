<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stillpoint — Mindful Pause</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, #F9E4B7 0%, #F2C97E 40%, #E8A87C 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      color: #3D2314;
    }

    .card {
      background: rgba(255, 255, 255, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 28px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }

    .icon {
      font-size: 56px;
      margin-bottom: 24px;
      display: block;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 1.1rem;
      opacity: 0.75;
      margin-bottom: 32px;
      font-style: italic;
    }

    p {
      font-size: 1rem;
      line-height: 1.7;
      opacity: 0.85;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-block;
      background: #3D2314;
      color: #F9E4B7;
      padding: 14px 32px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .badge:hover { opacity: 0.85; }

    footer {
      margin-top: 40px;
      font-size: 0.85rem;
      opacity: 0.6;
    }

    footer a {
      color: #3D2314;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🌿</span>
    <h1>Stillpoint</h1>
    <p class="tagline">The moment between impulse and action.</p>
    <p>
      Stillpoint intercepts the urge to scroll by guiding you through a brief
      mindfulness activity — a breathing exercise, guided imagery, or a moment
      of reflection — before opening your chosen apps.
    </p>
    <a class="badge" href="#">Coming soon to the App Store</a>
  </div>

  <footer>
    <a href="privacy.html">Privacy Policy</a>
  </footer>
</body>
</html>
